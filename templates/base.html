<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}DataSalary{% endblock %}</title>

  <!-- Bootstrap 5.3 CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  />

  <!-- Google Fonts: Syne + DM Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet"
  />

  <style>
    :root {
      --accent: #FF5C35;
      --accent-hover: #e04d2b;
      --bg-base: #0F0F0F;
      --bg-card: #1A1A1A;
      --bg-input: #111111;
      --border-subtle: #2A2A2A;
    }

    *, *::before, *::after {
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
    }

    body {
      background-color: var(--bg-base);
      color: #E8E8E8;
      font-family: "DM Sans", sans-serif;
      font-weight: 400;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    main {
      flex: 1;
    }

    /* Navbar */
    .site-nav {
      background-color: #111111;
      border-bottom: 1px solid var(--border-subtle);
    }

    .navbar-brand {
      font-family: "Syne", sans-serif;
      font-weight: 800;
      font-size: 1.35rem;
      color: #FFFFFF !important;
      letter-spacing: -0.5px;
    }

    .nav-link {
      color: #9A9A9A !important;
      font-weight: 500;
      font-size: 0.9rem;
      transition: color 0.2s;
    }

    .nav-link:hover {
      color: var(--accent) !important;
    }

    .navbar-toggler {
      border-color: var(--border-subtle);
    }

    .navbar-toggler-icon {
      filter: invert(1);
    }
  </style>

  {% block extra_styles %}{% endblock %}
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg site-nav">
    <div class="container">
      <a class="navbar-brand" href="/">DataSalary</a>
      <button
        class="navbar-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#navbarNav"
        aria-controls="navbarNav"
        aria-expanded="false"
        aria-label="Toggle navigation"
      >
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link" href="/#predict-form">Predict</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Page content -->
  {% block body %}{% endblock %}

  <!-- Bootstrap 5.3 JS Bundle -->
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmO5kEyNBzpoPP2iYQ/5BXNmPbql"
    crossorigin="anonymous"
  ></script>

  {% block extra_scripts %}{% endblock %}
</body>
</html>
